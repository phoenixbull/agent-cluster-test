<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent 集群指标 Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .header h1 {
            color: #1a202c;
            font-size: 28px;
            margin-bottom: 8px;
        }
        
        .header p {
            color: #718096;
            font-size: 14px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }
        
        .stat-card:hover {
            transform: translateY(-4px);
        }
        
        .stat-card h3 {
            color: #718096;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }
        
        .stat-card .value {
            color: #1a202c;
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        
        .stat-card .trend {
            font-size: 14px;
            padding: 4px 12px;
            border-radius: 9999px;
            display: inline-block;
        }
        
        .trend.positive {
            background: #c6f6d5;
            color: #22543d;
        }
        
        .trend.negative {
            background: #fed7d7;
            color: #742a2a;
        }
        
        .section {
            background: white;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .section h2 {
            color: #1a202c;
            font-size: 20px;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid #e2e8f0;
        }
        
        .agents-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 16px;
        }
        
        .agent-card {
            background: #f7fafc;
            border-radius: 8px;
            padding: 16px;
            border-left: 4px solid #667eea;
        }
        
        .agent-card h4 {
            color: #2d3748;
            margin-bottom: 12px;
        }
        
        .agent-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        
        .agent-stat {
            font-size: 13px;
        }
        
        .agent-stat label {
            color: #718096;
            display: block;
            margin-bottom: 4px;
        }
        
        .agent-stat span {
            color: #2d3748;
            font-weight: 600;
        }
        
        .tasks-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .tasks-table th,
        .tasks-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }
        
        .tasks-table th {
            background: #f7fafc;
            color: #4a5568;
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
        }
        
        .tasks-table tr:hover {
            background: #f7fafc;
        }
        
        .status-badge {
            padding: 4px 12px;
            border-radius: 9999px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .status-completed {
            background: #c6f6d5;
            color: #22543d;
        }
        
        .status-failed {
            background: #fed7d7;
            color: #742a2a;
        }
        
        .status-running {
            background: #bee3f8;
            color: #2a4365;
        }
        
        .chart-container {
            height: 300px;
            position: relative;
        }
        
        .refresh-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        
        .refresh-btn:hover {
            background: #5568d3;
        }
        
        .last-updated {
            color: #718096;
            font-size: 13px;
            margin-left: 16px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #718096;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #e2e8f0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h1>📊 Agent 集群指标 Dashboard</h1>
                    <p>实时监控 Agent 集群运行状态和效率指标</p>
                </div>
                <div>
                    <button class="refresh-btn" onclick="loadData()">🔄 刷新</button>
                    <span class="last-updated" id="lastUpdated">最后更新：--</span>
                </div>
            </div>
        </div>
        
        <!-- 核心指标卡片 -->
        <div class="stats-grid" id="statsGrid">
            <div class="loading"><div class="spinner"></div> 加载中...</div>
        </div>
        
        <!-- Agent 统计 -->
        <div class="section">
            <h2>🤖 Agent 性能统计</h2>
            <div class="agents-grid" id="agentsGrid">
                <div class="loading"><div class="spinner"></div> 加载中...</div>
            </div>
        </div>
        
        <!-- 失败分析 -->
        <div class="section">
            <h2>⚠️ 失败原因分析</h2>
            <div id="failureAnalysis">
                <div class="loading"><div class="spinner"></div> 加载中...</div>
            </div>
        </div>
        
        <!-- 最近任务 -->
        <div class="section">
            <h2>📋 最近任务</h2>
            <table class="tasks-table">
                <thead>
                    <tr>
                        <th>任务 ID</th>
                        <th>Agent</th>
                        <th>阶段</th>
                        <th>状态</th>
                        <th>耗时</th>
                        <th>成本</th>
                    </tr>
                </thead>
                <tbody id="tasksTable">
                    <tr><td colspan="6" class="loading"><div class="spinner"></div> 加载中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <script>
        // API 基础路径
        const API_BASE = '/api/metrics';
        
        // 格式化数字
        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }
        
        // 格式化成本
        function formatCost(cost) {
            return '¥' + parseFloat(cost).toFixed(2);
        }
        
        // 格式化时长
        function formatDuration(seconds) {
            if (!seconds) return '-';
            if (seconds < 60) return Math.round(seconds) + '秒';
            if (seconds < 3600) return (seconds / 60).toFixed(1) + '分钟';
            return (seconds / 3600).toFixed(1) + '小时';
        }
        
        // 加载汇总数据
        async function loadSummary() {
            try {
                const response = await fetch(`${API_BASE}/summary`);
                const result = await response.json();
                
                if (result.success) {
                    const data = result.data;
                    const grid = document.getElementById('statsGrid');
                    
                    grid.innerHTML = `
                        <div class="stat-card">
                            <h3>总任务数</h3>
                            <div class="value">${formatNumber(data.total_tasks || 0)}</div>
                            <div class="trend positive">完成 ${data.completed_tasks || 0}</div>
                        </div>
                        
                        <div class="stat-card">
                            <h3>平均完成时间</h3>
                            <div class="value">${formatDuration(data.avg_duration_seconds)}</div>
                            <div class="trend positive">效率指标</div>
                        </div>
                        
                        <div class="stat-card">
                            <h3>CI 通过率</h3>
                            <div class="value">${((data.ci_pass_rate || 0) * 100).toFixed(1)}%</div>
                            <div class="trend ${(data.ci_pass_rate || 0) > 0.8 ? 'positive' : 'negative'}">质量指标</div>
                        </div>
                        
                        <div class="stat-card">
                            <h3>总成本</h3>
                            <div class="value">${formatCost(data.total_cost || 0)}</div>
                            <div class="trend">今日 ${formatCost(data.today?.cost || 0)}</div>
                        </div>
                        
                        <div class="stat-card">
                            <h3>人工介入率</h3>
                            <div class="value">${((data.human_intervention_rate || 0) * 100).toFixed(1)}%</div>
                            <div class="trend ${(data.human_intervention_rate || 0) < 0.2 ? 'positive' : 'negative'}">自动化程度</div>
                        </div>
                        
                        <div class="stat-card">
                            <h3>失败任务</h3>
                            <div class="value">${data.failed_tasks || 0}</div>
                            <div class="trend negative">需关注</div>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('加载汇总数据失败:', error);
            }
        }
        
        // 加载 Agent 数据
        async function loadAgents() {
            try {
                const response = await fetch(`${API_BASE}/agents`);
                const result = await response.json();
                
                if (result.success) {
                    const data = result.data;
                    const grid = document.getElementById('agentsGrid');
                    
                    if (Object.keys(data).length === 0) {
                        grid.innerHTML = '<div class="loading">暂无 Agent 数据</div>';
                        return;
                    }
                    
                    grid.innerHTML = Object.values(data).map(agent => `
                        <div class="agent-card">
                            <h4>${agent.agent_name || agent.agent_id}</h4>
                            <div class="agent-stats">
                                <div class="agent-stat">
                                    <label>分配任务</label>
                                    <span>${agent.tasks_assigned || 0}</span>
                                </div>
                                <div class="agent-stat">
                                    <label>完成</label>
                                    <span style="color: #22543d">${agent.tasks_completed || 0}</span>
                                </div>
                                <div class="agent-stat">
                                    <label>失败</label>
                                    <span style="color: #742a2a">${agent.tasks_failed || 0}</span>
                                </div>
                                <div class="agent-stat">
                                    <label>成功率</label>
                                    <span>${((agent.success_rate || 0) * 100).toFixed(1)}%</span>
                                </div>
                                <div class="agent-stat">
                                    <label>平均耗时</label>
                                    <span>${formatDuration(agent.avg_duration_seconds)}</span>
                                </div>
                                <div class="agent-stat">
                                    <label>总成本</label>
                                    <span>${formatCost(agent.total_cost)}</span>
                                </div>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('加载 Agent 数据失败:', error);
            }
        }
        
        // 加载失败分析
        async function loadFailureAnalysis() {
            try {
                const response = await fetch(`${API_BASE}/failures`);
                const result = await response.json();
                
                if (result.success) {
                    const data = result.data;
                    const container = document.getElementById('failureAnalysis');
                    
                    if (!data.by_reason || Object.keys(data.by_reason).length === 0) {
                        container.innerHTML = '<div class="loading">暂无失败数据</div>';
                        return;
                    }
                    
                    const reasons = Object.entries(data.by_reason)
                        .sort((a, b) => b[1].count - a[1].count);
                    
                    container.innerHTML = `
                        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px;">
                            ${reasons.map(([reason, info]) => `
                                <div class="agent-card" style="border-left-color: #e53e3e;">
                                    <h4>${reason}</h4>
                                    <div class="agent-stats">
                                        <div class="agent-stat">
                                            <label>次数</label>
                                            <span style="color: #e53e3e">${info.count}</span>
                                        </div>
                                        <div class="agent-stat">
                                            <label>占比</label>
                                            <span>${info.percentage.toFixed(1)}%</span>
                                        </div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                        <div style="margin-top: 16px; color: #718096; font-size: 14px;">
                            总失败数：${data.total_failures || 0}
                        </div>
                    `;
                }
            } catch (error) {
                console.error('加载失败分析失败:', error);
            }
        }
        
        // 加载任务列表
        async function loadTasks() {
            try {
                const response = await fetch(`${API_BASE}/tasks?limit=20`);
                const result = await response.json();
                
                if (result.success) {
                    const tasks = result.data;
                    const tbody = document.getElementById('tasksTable');
                    
                    if (tasks.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="6" class="loading">暂无任务数据</td></tr>';
                        return;
                    }
                    
                    tbody.innerHTML = tasks.map(task => `
                        <tr>
                            <td style="font-family: monospace;">${task.task_id}</td>
                            <td>${task.agent_used || '-'}</td>
                            <td>${task.phase || '-'}</td>
                            <td>
                                <span class="status-badge status-${task.status}">
                                    ${task.status}
                                </span>
                            </td>
                            <td>${formatDuration(task.duration_seconds)}</td>
                            <td>${formatCost(task.cost)}</td>
                        </tr>
                    `).join('');
                }
            } catch (error) {
                console.error('加载任务数据失败:', error);
            }
        }
        
        // 加载所有数据
        async function loadData() {
            document.getElementById('lastUpdated').textContent = 
                '最后更新：' + new Date().toLocaleTimeString('zh-CN');
            
            await Promise.all([
                loadSummary(),
                loadAgents(),
                loadFailureAnalysis(),
                loadTasks()
            ]);
        }
        
        // 页面加载时获取数据
        document.addEventListener('DOMContentLoaded', loadData);
        
        // 每 30 秒自动刷新
        setInterval(loadData, 30000);
    </script>
</body>
</html>
