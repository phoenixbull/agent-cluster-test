# Alertmanager 配置文件
# Agent Cluster V2.7.1 告警通知

global:
  # 钉钉 Webhook
  resolve_timeout: 5m
  
  # 邮件配置（可选）
  smtp_smarthost: 'smtp.example.com:587'
  smtp_from: 'alertmanager@agent-cluster.com'
  smtp_auth_username: 'alertmanager@agent-cluster.com'
  smtp_auth_password: 'your_password'

# 告警路由
route:
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'default-receiver'
  
  # 子路由（按严重程度分流）
  routes:
    - match:
        severity: critical
      receiver: 'dingtalk-critical'
      repeat_interval: 5m
    
    - match:
        severity: warning
      receiver: 'dingtalk-warning'
      repeat_interval: 30m

# 告警接收器
receivers:
  # 默认接收器
  - name: 'default-receiver'
    webhook_configs:
      - url: 'http://localhost:5001/alerts'
        send_resolved: true

  # 钉钉 - 严重告警（@所有人）
  - name: 'dingtalk-critical'
    webhook_configs:
      - url: 'https://oapi.dingtalk.com/robot/send?access_token=3c5282dc6240317a2c1e8677cee449384aeeee6c6accf066c5dcfbcb944eebea'
        send_resolved: true
    dingtalk_configs:
      - url: 'https://oapi.dingtalk.com/robot/send?access_token=3c5282dc6240317a2c1e8677cee449384aeeee6c6accf066c5dcfbcb944eebea'
        secret: 'SEC34882f15108eb1d6ec9e780b991bc32440398ef284b1f72022e772972932fc6e'
        send_resolved: true
        at_all: true

  # 钉钉 - 警告告警（不@所有人）
  - name: 'dingtalk-warning'
    webhook_configs:
      - url: 'https://oapi.dingtalk.com/robot/send?access_token=3c5282dc6240317a2c1e8677cee449384aeeee6c6accf066c5dcfbcb944eebea'
        send_resolved: true
    dingtalk_configs:
      - url: 'https://oapi.dingtalk.com/robot/send?access_token=3c5282dc6240317a2c1e8677cee449384aeeee6c6accf066c5dcfbcb944eebea'
        secret: 'SEC34882f15108eb1d6ec9e780b991bc32440398ef284b1f72022e772972932fc6e'
        send_resolved: true
        at_all: false

  # 邮件通知（可选）
  - name: 'email'
    email_configs:
      - to: 'admin@example.com'
        from: 'alertmanager@agent-cluster.com'
        smarthost: 'smtp.example.com:587'
        auth_username: 'alertmanager@agent-cluster.com'
        auth_password: 'your_password'
        send_resolved: true
        headers:
          Subject: '🚨 [{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}'

# 告警抑制规则
inhibit_rules:
  # 如果存在 critical 告警，抑制同名的 warning 告警
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']
