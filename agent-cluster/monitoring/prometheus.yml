# Prometheus 配置文件
# Agent Cluster V2.7 监控

global:
  scrape_interval: 15s          # 默认抓取间隔
  evaluation_interval: 15s      # 规则评估间隔
  external_labels:
    monitor: 'agent-cluster'
    environment: 'production'

# 告警管理器
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - localhost:9093

# 规则文件
rule_files:
  - "alerts.yml"

# 抓取配置
scrape_configs:
  # Prometheus 自身监控
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          instance: 'prometheus'

  # Agent Cluster Web 应用
  - job_name: 'agent-cluster'
    static_configs:
      - targets: ['localhost:8890']
        labels:
          instance: 'web-app'
    metrics_path: '/metrics'

  # Node Exporter (系统监控)
  - job_name: 'node'
    static_configs:
      - targets: ['localhost:9100']
        labels:
          instance: 'agent-cluster-host'

  # Redis Exporter (缓存监控)
  - job_name: 'redis'
    static_configs:
      - targets: ['localhost:9121']
        labels:
          instance: 'redis-cache'

  # Docker 监控
  - job_name: 'docker'
    static_configs:
      - targets: ['localhost:9323']
        labels:
          instance: 'docker-daemon'

  # Nginx 监控
  - job_name: 'nginx'
    static_configs:
      - targets: ['localhost:9113']
        labels:
          instance: 'nginx-proxy'
