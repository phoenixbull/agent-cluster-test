# Prometheus 告警规则

groups:
  - name: agent_cluster_alerts
    interval: 30s
    rules:
      # 服务宕机告警
      - alert: ServiceDown
        expr: up{job="agent-cluster"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Agent Cluster 服务宕机"
          description: "实例 {{ $labels.instance }} 已宕机超过 1 分钟"

      # 高错误率告警
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "错误率过高"
          description: "实例 {{ $labels.instance }} 的 5xx 错误率超过 10%"

      # 高响应时间告警
      - alert: HighResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "响应时间过长"
          description: "P95 响应时间超过 1 秒"

      # 内存使用率告警
      - alert: HighMemoryUsage
        expr: (process_resident_memory_bytes / 1024 / 1024) > 500
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "内存使用率过高"
          description: "进程内存使用超过 500MB"

      # CPU 使用率告警
      - alert: HighCPUUsage
        expr: rate(process_cpu_seconds_total[5m]) > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "CPU 使用率过高"
          description: "CPU 使用率超过 80%"

      # 磁盘空间告警
      - alert: LowDiskSpace
        expr: (node_filesystem_avail_bytes / node_filesystem_size_bytes) < 0.1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "磁盘空间不足"
          description: "磁盘可用空间低于 10%"

      # 工作流失败告警
      - alert: WorkflowFailed
        expr: workflow_status{status="failed"} > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "工作流执行失败"
          description: "有工作流执行失败，需要关注"

      # 部署失败告警
      - alert: DeploymentFailed
        expr: deployment_status{status="failed"} > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "部署失败"
          description: "部署执行失败"
