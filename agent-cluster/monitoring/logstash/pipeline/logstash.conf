# Logstash 管道配置
# 收集 Agent Cluster 日志并发送到 Elasticsearch

input {
  # 从文件收集日志
  file {
    path => "/var/log/agent-cluster/*.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    type => "agent-cluster"
    tags => ["agent-cluster"]
  }

  # 从 Docker 容器收集日志
  docker {
    host => "unix:///var/run/docker.sock"
    tags => ["docker"]
  }

  # TCP 输入（应用直接发送）
  tcp {
    port => 5000
    codec => json
    type => "application"
  }
}

filter {
  # 解析 JSON 日志
  if [type] == "agent-cluster" {
    json {
      source => "message"
      target => "parsed"
    }
    
    # 提取时间戳
    date {
      match => ["timestamp", "ISO8601", "yyyy-MM-dd HH:mm:ss"]
      target => "@timestamp"
    }
    
    # 添加环境标签
    mutate {
      add_field => {
        "environment" => "production"
        "service" => "agent-cluster"
      }
    }
  }
  
  # 解析 Docker 日志
  if [type] == "docker" {
    grok {
      match => { "message" => "%{TIMESTAMP_ISO8601} %{LOGLEVEL:level} %{GREEDYDATA:log_message}" }
    }
  }
  
  # 移除不必要字段
  mutate {
    remove_field => ["host", "agent"]
  }
}

output {
  # 发送到 Elasticsearch
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "agent-cluster-logs-%{+YYYY.MM.dd}"
    document_type => "_doc"
  }
  
  # 调试输出（可选）
  # stdout {
  #   codec => rubydebug
  # }
}
