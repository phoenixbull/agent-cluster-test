# Nginx 性能优化配置
# 用于 Agent Cluster V2.5

# 添加到 server 块中

# ========== Gzip 压缩 ==========
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 1000;
gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

# ========== 浏览器缓存 ==========
location /static/ {
    alias /home/admin/.openclaw/workspace/agent-cluster/static/;
    
    # 静态文件缓存 7 天
    expires 7d;
    add_header Cache-Control "public, immutable";
    
    # 已压缩文件不再压缩
    gzip off;
}

location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
    expires 7d;
    add_header Cache-Control "public, immutable";
    access_log off;
}

location ~* \.(html|htm)$ {
    expires -1;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
}

# ========== 反向代理优化 ==========
location / {
    proxy_pass http://127.0.0.1:8890;
    proxy_http_version 1.1;
    
    # 连接保持
    proxy_set_header Connection "";
    
    # 标准代理头
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # 超时设置
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    
    # 缓冲区优化
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 4k;
    proxy_busy_buffers_size 8k;
}

# ========== API 缓存（可选） ==========
# 为不经常变化的 API 启用缓存
proxy_cache_path /var/cache/nginx/agent-cluster levels=1:2 keys_zone=api_cache:10m max_size=100m inactive=60m use_temp_path=off;

# 在 location /api/status 中添加
# proxy_cache api_cache;
# proxy_cache_valid 200 30s;
# proxy_cache_valid 404 1m;
# add_header X-Cache-Status $upstream_cache_status;

# ========== 限流配置 ==========
# 定义限流区域（在 http 块中定义）
# limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# 在 API location 中使用
# location /api/ {
#     limit_req zone=api_limit burst=20 nodelay;
#     proxy_pass http://127.0.0.1:8890;
# }

# ========== 安全头 ==========
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# ========== 日志优化 ==========
# 使用缓冲日志
access_log /var/log/nginx/agent-cluster_access.log buffer=32k flush=5m;
error_log /var/log/nginx/agent-cluster_error.log warn;

