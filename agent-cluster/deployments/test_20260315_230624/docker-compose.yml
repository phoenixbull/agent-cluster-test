version: '3.8'

services:
  app:
    image: test_20260315_230624:latest
    container_name: test_20260315_230624
    ports:
      - "8080:8080"
    restart: unless-stopped
    environment:
      - ENV=production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
