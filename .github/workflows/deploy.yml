name: Deploy to Server

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 5m
          script: |
            echo "🚀 开始部署..."
            cd /home/admin/.openclaw/workspace/agent-cluster
            
            echo "📦 拉取最新代码..."
            git fetch origin main
            git reset --hard origin/main
            
            echo ""
            echo "✅ 代码已更新到最新版本"
            echo ""
            echo "📝 下一步：手动重启服务"
            echo "   sudo systemctl restart agent-cluster"
            echo ""
            echo "🔍 或者检查服务状态："
            echo "   sudo systemctl status agent-cluster"
            echo ""
            
            exit 0            
