name: Deploy to Server

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 5m
          script: |
            echo "🚀 开始部署..."
            cd /home/admin/.openclaw/workspace/agent-cluster
            
            echo "📦 拉取最新代码..."
            git fetch origin main
            git reset --hard origin/main
            
            echo "🔄 重启服务..."
            # 使用 bash -c 在子 shell 中启动，避免影响 SSH
            bash -c '
              pkill -f "web_app_v2.py" 2>/dev/null || true
              sleep 2
              cd /home/admin/.openclaw/workspace/agent-cluster
              nohup python3 web_app_v2.py --port 8890 > /dev/null 2>&1 &
            '
            
            echo "⏳ 等待服务启动..."
            sleep 5
            
            echo "🔍 健康检查..."
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8890 || echo "000")
            
            if [ "$HTTP_CODE" = "302" ] || [ "$HTTP_CODE" = "200" ]; then
              echo "✅ 部署成功！HTTP $HTTP_CODE"
              exit 0
            else
              echo "❌ 部署失败！HTTP $HTTP_CODE"
              exit 1
            fi            
